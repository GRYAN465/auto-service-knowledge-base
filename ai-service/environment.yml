name: kb-ai
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # —— Web 框架 ——
      - fastapi>=0.115
      - uvicorn[standard]==0.49.*
      - pydantic==2.13.*
      - pydantic-settings==2.14.*
      - python-multipart==0.0.*
      # —— Embedding：本地 bge-zh（CPU），版本对齐已验证可用的组合 ——
      - torch==2.12.*
      - transformers==5.12.*
      - sentence-transformers==5.6.*
      - numpy==2.4.*
      # —— 向量库 ——
      - chromadb>=0.5
      # —— 文档解析（pdf / docx / md / txt）——
      - pypdf>=4
      - python-docx>=1.1
      - markdown==3.10.*
      # —— LLM（M9.2 智能问答用，先装无害）——
      - ms-agent==1.6.*
      - modelscope==1.37.*
      - openai==2.42.*
