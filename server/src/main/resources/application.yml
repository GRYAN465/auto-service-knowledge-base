server:
  port: 8080
  servlet:
    context-path: /api          # 接口前缀，配合《API契约.md》Base URL .../api

spring:
  application:
    name: kb-server
  datasource:
    url: jdbc:mysql://localhost:3306/kb?useSSL=false&serverTimezone=UTC
    username: kb                  # 本项目专属账号，仅授权 kb 库（用 root 建：CREATE USER 'kb'@'localhost'...）
    password: 123456              # 本地覆盖请写 application-local.yml（已 .gitignore），勿提交真实口令
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

springdoc:
  swagger-ui:
    path: /swagger-ui.html       # 实际访问 /api/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info      # /api/actuator/health

kb:
  jwt:
    secret: "kb-knowledge-base-jwt-secret-change-me-in-prod-0123456789abcdef"  # HS256 需 >=32 字符
    expire-minutes: 720
  storage:
    local-dir: ./uploads          # 本地文件存储目录（FileStorage 抽象）
  ai:
    base-url: http://localhost:8000  # 二期 FastAPI 地址
    connect-timeout-ms: 5000         # 连接超时
    read-timeout-ms: 180000          # 读超时（首次加载 embedding 模型可能较慢）
    auto-rebuild-on-startup: true
    auto-rebuild-wait-ms: 120000     # 等待 Python 就绪的最长时间（毫秒）
  recommend:
    search-limit: 10
    like-limit: 5
    immediate-search-hours: 24
    immediate-search-limit: 3
    recent-search-days: 7
    top-tags: 5
    candidate-per-tag: 50
    result-limit: 5
    search-recall-limit: 20
    profile-weight-immediate: 0.45
    profile-weight-recent-search: 0.25
    profile-weight-recent-like: 0.15
    profile-weight-pinned-tag: 0.15
    weight-interest-base: 0.72
    weight-interest-boost: 0.13
    interest-article-sim: 0.35
    interest-tag-sim: 0.30
    interest-keyword-hit: 0.25
    interest-like-tag: 0.10
    hot-view-weight: 0.45
    hot-like-weight: 0.35
    hot-comment-weight: 0.20
    max-embed-articles: 120

logging:
  level:
    com.kb: debug
